[meta]
name        = "Sidebar Right"
description = "Tall, narrow panel snapping to the right edge of the screen"

[window]
width           = 380
height          = 900
anchor          = "right, center"
margin          = [20, 20, 20, 0]
background      = "$surface"
border          = { radius = 16, width = 1, color = "$surface-container-highest" }
exclusive       = true
ignore-exclusive = false
keyboard        = "exclusive"

[widget.input]
font            = { family = "sans-serif", size = 15, weight = "normal" }
text            = "$on-surface"
placeholder     = { text = "Filter...", color = "$outline" }
background      = "$surface-container-low"
border          = { radius = 8, width = 1, color = "$surface-container-highest" }
caret           = { width = 2.0, color = "$caret" }
selection       = { color = "$selection", text = "$on-surface" }
padding         = [12, 12, 12, 12]
align           = "left"

[widget.input.prompt]
enable          = false

[widget.results]
margin          = [10, 0, 0, 0]
padding         = [10, 10, 10, 10]
gap             = 6
border          = { radius = 0, width = 0 }
scroll          = "follow"
reverse         = false

[widget.results.scrollbar]
enable          = true
width           = 3
padding         = 2
radius          = 2
thumb           = "$secondary"
track           = "#00000000"

[widget.results.item]
font            = { family = "sans-serif", size = 14, weight = "normal" }
text            = "$on-surface-variant"
background      = "#00000000"
border          = { radius = 6, width = 1, color = "transparent" }
padding         = [8, 10, 8, 10]
align           = "left"
icon            = { size = 20, gap = 10, show = true }

[widget.results.item.comment]
enable          = true
font            = { size = 11, weight = "normal" }
text            = "$outline"

[widget.results.item.highlight]
enable          = true
font            = { weight = "bold" }
text            = "$tertiary"

[widget.results.item.selected]
text            = "$on-surface"
background      = "$surface-container-high"
border          = { radius = 6, width = 1, color = "$outline-variant" }
comment         = "$secondary"
highlight       = "$match"

[widget.preview]
enable          = true

[widget.results.count]
enable          = true
format          = "{count} items found"
font            = { family = "sans-serif", size = 11, weight = "normal" }
text            = "$outline"
align           = "center"
padding         = [10, 0, 10, 0]

[widget.clock]
enable          = true
